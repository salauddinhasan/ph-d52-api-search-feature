<!doctype html>
<html lang="en" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Home page GitHub issues tracker</title>

    <!-- Tailwind -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- DaisyUI -->
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@latest/dist/full.css"
      rel="stylesheet"
      type="text/css"
    />

    <!-- Font Awesome -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    />

    <!-- font family -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap"
      rel="stylesheet"
    />

    <style>
      body {
        font-family: "Geist", sans-serif;
      }
    </style>
  </head>
  <body>
    <!-- header section -->
    <section class="header-section">
      <!-- container -->
      <div class="md:w-11/12 mx-auto p-3">
        <!-- header container -->
        <div
          class="header-container md:flex md:justify-between space-y-3 gap-2"
        >
          <!-- img -->
          <div class="flex items-center gap-1">
            <img class="w-8" src="assets/github-logo.png" alt="" />
            <h1 class="text-xl font-bold">GitHub Issues Tracker</h1>
          </div>

          <!-- search input -->
          <div class="relative join w-full max-w-md">
            <i
              class="fa-solid fa-magnifying-glass absolute left-3 top-1/2 -translate-y-1/2 text-gray-400"
            ></i>

            <input
              id="searchInput"
              type="search"
              placeholder="Search issues..."
              required
              class="input input-bordered join-item w-full pl-8 py-3"
            />
            <button
              id="newIssueBtn"
              type="button"
              class="btn btn-primary join-item rounded-lg"
            >
              <i class="fa-solid fa-plus"></i> New Issue
            </button>
          </div>
        </div>
      </div>
    </section>
    <hr class="w-full" />

    <!-- card section -->
    <section class="card-section">
      <!-- container -->
      <div class="max-w-screen-2xl mx-auto p-3">
        <!-- card-container -->
        <div
          id="card-container"
          class="grid md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6"
        ></div>
      </div>
    </section>

 
<script>

const cardContainer = document.getElementById("card-container");
const searchInput = document.getElementById("searchInput");

let allIssues = [];

fetch("https://phi-lab-server.vercel.app/api/v1/lab/issues")
  .then(res => res.json())
  .then(data => {

    allIssues = data.data;

    displayIssues(allIssues);

  });

function displayIssues(issues){

  cardContainer.innerHTML = "";

  issues.forEach(issue => {

    cardContainer.innerHTML += `
      
      <div class="shadow-md p-3 rounded-lg space-y-4 border-t-4 border-t-[#00A96E] hover:shadow-lg transition">

        <div class="flex justify-between items-center">
          <img class="h-7" src="assets/Open-Status.png" alt="">
          <p class="font-bold bg-[#FEECEC] px-4 rounded-full py-1 text-[#EF4444]">
            ${issue.priority}
          </p>
        </div>

        <h2 class="font-bold text-gray-700">
          ${issue.title}
        </h2>

        <p class="text-xs font-medium text-gray-500">
          ${issue.description || ""}
        </p>

        <hr>

        <div class="flex justify-between text-sm font-medium text-gray-500">
          <p>#${issue.id}</p>
          <p>${issue.createdAt || "N/A"}</p>
        </div>

      </div>

    `;
  });

}

searchInput.addEventListener("input", function(){

  const searchValue = searchInput.value.toLowerCase();

  const filteredIssues = allIssues.filter(issue =>
    issue.title.toLowerCase().includes(searchValue)
  );

  displayIssues(filteredIssues);

});

</script>

  </body>
</html>
