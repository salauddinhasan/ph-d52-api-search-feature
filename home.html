<!doctype html>
<html lang="en" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Home page GitHub issues tracker</title>

    <!-- Tailwind -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- DaisyUI -->
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@latest/dist/full.css"
      rel="stylesheet"
      type="text/css"
    />

    <!-- Font Awesome -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    />

    <!-- font family -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap"
      rel="stylesheet"
    />

    <style>
      body {
        font-family: "Geist", sans-serif;
      }
    </style>
  </head>
  <body>
    <!-- header section -->
    <section class="header-section">
      <!-- container -->
      <div class="md:w-11/12 mx-auto p-3">
        <!-- header container -->
        <div class="header-container md:flex md:justify-between space-y-3 gap-2">
          <!-- img -->
          <div class="flex items-center gap-1">
            <img class="w-8" src="assets/github-logo.png" alt="" />
            <h1 class="text-xl font-bold">GitHub Issues Tracker</h1>
          </div>

          <!-- search input -->
          <div class="relative join w-full max-w-md">
            <i
              class="fa-solid fa-magnifying-glass absolute left-3 top-1/2 -translate-y-1/2 text-gray-400"
            ></i>

            <input
            id="searchInput"
              type="search"
              placeholder="Search issues..."
              required
              class="input input-bordered join-item w-full pl-8 py-3"
            />
            <button  id="newIssueBtn" type="button" class="btn btn-primary join-item rounded-lg">
              <i class="fa-solid fa-plus"></i> New Issue
            </button>
          </div>
        </div>
      </div>
    </section>
    <hr class="w-full" />
